# Symbols that are not equities / not suitable for breakout scoring.
# They are retained in portfolio_holdings for position tracking but skipped
# during feature / state / label computation.
# Document: add any ETF-of-ETFs, money-market, or illiquid instruments here.
non_equity_symbols:
  - SPAXX    # Fidelity money market / cash equivalent — no OHLCV via yfinance

# Provider-specific symbol aliases.
# Format: user_symbol: provider_symbol
# Used by ingest/symbols.py to translate before calling yfinance.
# Keep both: user_symbol (for display / config / report) and provider_symbol (for data fetch).
symbol_aliases:
  BRK.B: BRK-B     # yfinance requires hyphen, not dot
  # Add others as discovered, e.g.:
  # BF.B: BF-B

# Runtime liquidity filter — applied AFTER daily bars are available.
# Symbols lacking data are kept and flagged; they cannot be silently dropped.
liquidity_filter:
  enabled: false    # disabled by default in v1 so watchlist is always fully evaluated
  min_dollar_volume_median_20d: 10000000
  min_price: 5.0
  max_symbols: 750

# Monthly membership snapshotting for approximate point-in-time reconstruction.
# v1 limitation: not true point-in-time; survivorship bias is noted in every report footer.
history:
  snapshots_dir: config/universe_history
  snapshot_frequency: monthly
