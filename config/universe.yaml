# Universe configuration for swingtrader v1.
#
# Source priority for deduplication:
#   benchmarks → sector_etfs → sp500 → nasdaq100 → portfolio_holdings → custom_watchlist
#
# The pipeline always runs on portfolio_holdings + custom_watchlist regardless of whether
# sp500.csv / nasdaq100.csv are present. Broader membership files enrich the universe
# but are never required for a daily run.
#
# Symbol normalization: user-facing symbols are stored here as-is (e.g. BRK.B).
# The ingest layer translates them to provider-specific symbols via symbol_aliases
# before calling yfinance. All parquet files and output artifacts use the
# provider_symbol (yfinance key). Reports map back to the user_symbol.

active_sources:
  # Controls which sections are loaded. Set false to disable a source without deleting it.
  benchmarks: true
  sector_etfs: true
  sp500: false        # requires data/reference/sp500.csv — run scripts/refresh_universe.py
  nasdaq100: false    # requires data/reference/nasdaq100.csv
  portfolio_holdings: true
  custom_watchlist: true

sources:
  benchmarks:
    symbols:
      - SPY
      - QQQ
      - IWM
      - DIA
      - MDY
      - RSP     # equal-weight S&P 500 — useful breadth proxy

  sector_etfs:
    symbols:
      - XLK     # Technology
      - XLF     # Financials
      - XLE     # Energy
      - XLV     # Health Care
      - XLI     # Industrials
      - XLY     # Consumer Discretionary
      - XLP     # Consumer Staples
      - XLB     # Materials
      - XLU     # Utilities
      - XLRE    # Real Estate
      - XLC     # Communication Services
      - XBI     # Biotech
      - SMH     # Semiconductors
      - IGV     # Software
      - ITB     # Home Construction
      - KRE     # Regional Banks
      - XOP     # Oil & Gas E&P
      - XRT     # Retail
      - XHB     # Homebuilders

  sp500:
    cache_path: data/reference/sp500.csv   # column: symbol

  nasdaq100:
    cache_path: data/reference/nasdaq100.csv

  # Current portfolio holdings — always included in every daily run.
  # SPAXX is a money-market / cash-equivalent; it is tagged separately and excluded
  # from breakout scoring (see non_equity_symbols below).
  portfolio_holdings:
    symbols:
      - SPAXX   # cash / Fidelity money market — tagged, not scored
      - VOO
      - QQQ
      - VXUS
